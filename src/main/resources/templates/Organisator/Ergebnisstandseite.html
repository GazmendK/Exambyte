<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <title>Ergebnisse – ExamByte</title>
</head>
<body>
<nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
        <a class="navbar-brand" href="/Organisator"><em>Exam</em>Byte</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav"
                aria-controls="nav" aria-expanded="false" aria-label="Navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="nav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="/Organisator/CreateTest">Test erstellen</a></li>
                <li class="nav-item"><a class="nav-link" href="/Organisator/Aufgabenliste">Testvorschau</a></li>
                <li class="nav-item"><a class="nav-link" href="/Organisator/Ergebnisstandseite">Ergebnisse</a></li>
                <li class="nav-item"><a class="nav-link" href="/Organisator/Korrekturstandseite">Korrekturstatus</a></li>
                <li class="nav-item"><a class="nav-link" href="/Organisator/Freitextantworten">Freitextantworten</a></li>
            </ul>
            <a class="nav-link" href="/logout">Abmelden</a>
        </div>
    </div>
</nav>
<div class="page-container">
    <div class="page-header">
        <p class="page-eyebrow">Organisator</p>
        <h1>Ergebnisübersicht</h1>
    </div>
    <div th:if="${#lists.isEmpty(tests)}" class="alert alert-info">Noch keine Tests vorhanden.</div>
    <table th:if="${!#lists.isEmpty(tests)}" class="table" aria-label="Tests">
        <thead><tr>
            <th scope="col">Test</th>
            <th scope="col">Startzeit</th>
            <th scope="col">Endzeit</th>
            <th scope="col">Max. Punkte</th>
            <th scope="col">Aktion</th>
        </tr></thead>
        <tbody>
        <tr th:each="test : ${tests}">
            <td th:text="${test.testName}"></td>
            <td class="mono" th:text="${#temporals.format(test.startZeit, 'dd.MM.yy HH:mm')}"></td>
            <td class="mono" th:text="${#temporals.format(test.endZeit, 'dd.MM.yy HH:mm')}"></td>
            <td class="mono" th:text="${test.maxPunkteTest}"></td>
        <tr><a th:href="@{/Organisator/Ergebnisstandseite/{id}(id=${test.id})}" class="btn btn-sm btn-primary">Details →</a></td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
