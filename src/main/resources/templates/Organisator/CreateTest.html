<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <title>Test erstellen – ExamByte</title>
</head>
<body>
<nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
        <a class="navbar-brand" href="/Organisator"><em>Exam</em>Byte</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav"
                aria-controls="nav" aria-expanded="false" aria-label="Navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="nav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="/Organisator/CreateTest">Test erstellen</a></li>
                <li class="nav-item"><a class="nav-link" href="/Organisator/Aufgabenliste">Testvorschau</a></li>
                <li class="nav-item"><a class="nav-link" href="/Organisator/Ergebnisstandseite">Ergebnisse</a></li>
                <li class="nav-item"><a class="nav-link" href="/Organisator/Korrekturstandseite">Korrekturstatus</a></li>
                <li class="nav-item"><a class="nav-link" href="/Organisator/Freitextantworten">Freitextantworten</a></li>
            </ul>
            <a class="nav-link" href="/logout">Abmelden</a>
        </div>
    </div>
</nav>
<div class="page-container-narrow">
    <div class="page-header">
        <p class="page-eyebrow">Organisator</p>
        <h1>Test erstellen</h1>
    </div>
    <div class="card">
        <div class="card-header">Testdaten</div>
        <div class="card-body">
            <form th:action="@{/Organisator/CreateTest}" method="post" th:object="${test}">
                <div class="mb-3">
                    <label for="testName" class="form-label">Test-Titel</label>
                    <input type="text" class="form-control" id="testName" name="testName"
                           th:field="*{testName}" placeholder="z.B. Wochentest 01" required>
                </div>
                <div class="mb-3">
                    <label for="startZeit" class="form-label">Startzeitpunkt</label>
                    <input type="datetime-local" class="form-control" id="startZeit" name="startZeit" th:field="*{startZeit}" required>
                </div>
                <div class="mb-3">
                    <label for="endZeit" class="form-label">Endzeitpunkt</label>
                    <input type="datetime-local" class="form-control" id="endZeit" name="endZeit" th:field="*{endZeit}" required>
                </div>
                <div class="mb-3">
                    <label for="veroeffentlichung" class="form-label">Ergebnis-Veröffentlichung</label>
                    <input type="datetime-local" class="form-control" id="veroeffentlichung" name="veroeffentlichung" th:field="*{veroeffentlichung}" required>
                </div>
                <div style="display:flex; gap:0.75rem; padding-top:0.5rem; border-top:1px solid var(--border); margin-top:1rem;">
                    <button type="submit" class="btn btn-primary">Test speichern</button>
                    <a href="/Organisator" class="btn btn-secondary">Abbrechen</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
